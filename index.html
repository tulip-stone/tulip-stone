<!DOCTYPE html>
<html lang="en" x-data="multiLang" :lang="lang" :dir="lang === 'ar' ? 'rtl' : 'ltr'">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tulip Stone | Marble & Granite</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        /* --- PREMIUM CSS STYLES --- */
        :root {
            --primary-gold: #c5a880;
            --dark-gold: #9e815a;
            --rich-black: #0b0b0b;
            --slate-black: #121212;
            --pure-white: #ffffff;
            --gray-text: #b3b3b3;
            --transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: var(--rich-black);
            color: var(--pure-white);
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        h1, h2, h3, .nav-links a, .gold-title {
            font-family: 'Playfair Display', serif;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
        }
        .gold-text { color: var(--primary-gold); }
        
        .btn-gold {
            background: var(--primary-gold);
            color: var(--rich-black);
            padding: 12px 28px;
            border: 1px solid var(--primary-gold);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        .btn-gold:hover {
            background: transparent;
            color: var(--primary-gold);
            box-shadow: 0 0 15px rgba(197, 168, 128, 0.4);
        }
        
        .btn-outline {
            background: transparent;
            color: var(--pure-white);
            padding: 12px 28px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            display: inline-block;
        }
        .btn-outline:hover {
            border-color: var(--primary-gold);
            color: var(--primary-gold);
        }

        .lang-btn {
            background: transparent;
            border: 1px solid var(--primary-gold);
            color: var(--primary-gold);
            padding: 6px 14px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            font-size: 0.85rem;
        }
        .lang-btn:hover {
            background: var(--primary-gold);
            color: var(--rich-black);
        }

        /* Header & Navbar */
        header {
            position: fixed;
            top: 0; left: 0; width: 100%;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(11,11,11,0.95), rgba(11,11,11,0.7));
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(197, 168, 128, 0.15);
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--primary-gold);
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 1.5px;
        }
        .logo img { height: 40px; }
        
        .nav-links { 
            display: flex; 
            list-style: none; 
            gap: 15px; 
        }
        .nav-links a {
            color: var(--pure-white);
            text-decoration: none;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: var(--transition);
        }
        .nav-links a:hover, .nav-links a.active { color: var(--primary-gold); }

        /* Hero Slider Section */
        .hero-section { width: 100%; height: 100vh; position: relative; padding-top: 85px; }
        .swiper { width: 100%; height: 100%; }
        .swiper-slide {
            position: relative;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
        }
        .swiper-slide::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.65);
        }
        .hero-content { position: relative; z-index: 10; max-width: 650px; }
        html[dir="ltr"] .hero-content { padding-left: 5%; }
        html[dir="rtl"] .hero-content { padding-right: 5%; }

        .hero-content span {
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.85rem;
            color: var(--primary-gold);
            font-weight: 600;
        }
        .hero-content h1 { font-size: 4rem; line-height: 1.1; margin: 15px 0 25px 0; font-weight: 400; }
        .hero-content p { color: var(--gray-text); font-size: 1.05rem; line-height: 1.6; margin-bottom: 35px; }
        .hero-buttons { display: flex; gap: 20px; }

        .swiper-button-next, .swiper-button-prev { color: var(--primary-gold) !important; }
        .swiper-pagination-bullet-active { background: var(--primary-gold) !important; }

        /* Features Section */
        .features-section { background: var(--slate-black); padding: 60px 0; border-bottom: 1px solid rgba(197, 168, 128, 0.1); }
        .features-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 30px; }
        .feature-box { text-align: center; padding: 20px; border-right: 1px solid rgba(197, 168, 128, 0.15); }
        html[dir="rtl"] .feature-box { border-right: none; border-left: 1px solid rgba(197, 168, 128, 0.15); }
        .feature-box:last-child { border-right: none; border-left: none; }
        .feature-box i { font-size: 2rem; color: var(--primary-gold); margin-bottom: 15px; }
        .feature-box h3 { font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .feature-box p { color: var(--gray-text); font-size: 0.85rem; line-height: 1.5; }

        /* About Section */
        .about-section { padding: 100px 0; background: var(--rich-black); }
        .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }
        .about-img img { width: 100%; height: auto; border: 1px solid var(--primary-gold); box-shadow: 0 15px 35px rgba(0,0,0,0.7); }
        .about-content span { color: var(--primary-gold); text-transform: uppercase; letter-spacing: 2px; font-size: 0.85rem; font-weight: 600; }
        .about-content h2 { font-size: 3rem; margin: 10px 0 25px 0; font-weight: 400; }
        .about-content p { color: var(--gray-text); line-height: 1.7; margin-bottom: 30px; font-size: 0.95rem; }

        /* Product Items Section */
        .product-items-section { padding: 80px 0; background: var(--slate-black); }
        .section-title { text-align: center; margin-bottom: 60px; }
        .section-title span { color: var(--primary-gold); text-transform: uppercase; letter-spacing: 2px; font-size: 0.85rem; font-weight: 600; }
        .section-title h2 { font-size: 3.5rem; margin: 10px 0 0 0; font-weight: 400; color: var(--primary-gold); }
        
        .products-items-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; }
        .sizes-items-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 30px; }

        .product-card { background: var(--rich-black); border: 1px solid rgba(197, 168, 128, 0.1); transition: var(--transition); overflow: hidden; }
        .product-card:hover { border-color: var(--primary-gold); transform: translateY(-10px); }
        .product-card-img { width: 100%; height: 250px; background-size: cover; background-position: center; }
        .product-card-body { padding: 25px; }
        .product-card-body h3 { font-size: 1.3rem; margin-bottom: 10px; color: var(--primary-gold); }
        .product-card-body p { color: var(--gray-text); font-size: 0.85rem; line-height: 1.6; margin-bottom: 20px; }

        /* Services & Stats */
        .services-stats-section {
            padding: 100px 0;
            background: linear-gradient(rgba(11,11,11,0.9), rgba(11,11,11,0.9)), url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1200&q=80') center/cover;
            border-top: 1px solid rgba(197, 168, 128, 0.15);
        }
        .split-grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 80px; }
        .services-area h2, .stats-area h2 {
            font-size: 1.8rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 40px;
            border-bottom: 1px solid rgba(197, 168, 128, 0.2); padding-bottom: 15px;
        }
        .services-list-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .service-item { display: flex; align-items: center; gap: 15px; background: rgba(18, 18, 18, 0.6); padding: 15px; }
        html[dir="ltr"] .service-item { border-left: 3px solid var(--primary-gold); }
        html[dir="rtl"] .service-item { border-right: 3px solid var(--primary-gold); }
        .service-item i { color: var(--primary-gold); font-size: 1.2rem; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .stat-box { text-align: center; background: rgba(18, 18, 18, 0.4); padding: 25px 15px; border: 1px solid rgba(197, 168, 128, 0.1); }
        .stat-number { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--primary-gold); font-weight: bold; margin-bottom: 5px; }
        .stat-label { font-size: 0.8rem; color: var(--gray-text); text-transform: uppercase; letter-spacing: 1px; }

        /* Projects Gallery */
        .projects-section { padding: 80px 0; background: var(--rich-black); }
        .projects-section h2 { font-size: 2rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 40px; }
        .projects-gallery { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; }
        .gallery-item { position: relative; height: 250px; overflow: hidden; border: 1px solid rgba(197, 168, 128, 0.1); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: var(--transition); }
        .gallery-item:hover img { transform: scale(1.1); }

        /* Footer */
        footer { background: var(--slate-black); padding: 80px 0 30px 0; border-top: 1px solid rgba(197, 168, 128, 0.2); }
        .footer-grid { display: grid; grid-template-columns: 1.2fr 0.8fr 0.8fr 1.2fr; gap: 40px; margin-bottom: 60px; }
        .footer-about .footer-logo { color: var(--primary-gold); font-size: 1.4rem; font-family: 'Playfair Display', serif; font-weight: bold; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .footer-about .footer-logo img { height: 1.5rem; width: auto; }
        .footer-about p { color: var(--gray-text); font-size: 0.85rem; line-height: 1.6; margin-bottom: 20px; }
        
        html[dir="ltr"] .social-icons a { margin-right: 15px; }
        html[dir="rtl"] .social-icons a { margin-left: 15px; }
        .social-icons a { color: var(--gray-text); font-size: 1.1rem; transition: var(--transition); }
        .social-icons a:hover { color: var(--primary-gold); }

        .footer-links h4, .footer-contact h4, .footer-form h4 { color: var(--primary-gold); font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 25px; }
        .footer-links ul { list-style: none; }
        .footer-links ul li { margin-bottom: 12px; }
        .footer-links ul li a { color: var(--gray-text); text-decoration: none; font-size: 0.85rem; transition: var(--transition); }
        .footer-links ul li a:hover { color: var(--pure-white); }
        .footer-contact p { color: var(--gray-text); font-size: 0.85rem; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .footer-contact p a { color: var(--gray-text); text-decoration: none; transition: var(--transition); }
        .footer-contact p a:hover { color: var(--primary-gold); }
        .footer-contact i { color: var(--primary-gold); }
        .footer-form p { color: var(--gray-text); font-size: 0.85rem; margin-bottom: 20px; }
        .copyright { text-align: center; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 30px; color: rgba(255,255,255,0.3); font-size: 0.75rem; letter-spacing: 1px; }

        /* MODAL SYSTEM (Unified for Marble, Granite, and Tombstone) */
        .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); z-index: 200; }
        .modal-content {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--slate-black); border: 1px solid var(--primary-gold);
            max-width: 650px; width: 90%; max-height: 90vh; overflow-y: auto; z-index: 201; padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        
        /* Dynamic Image Sizing for Tombstone (Original Proportion without cropping) */
        .modal-img-container { width: 100%; display: flex; justify-content: center; align-items: center; background: #000; margin-bottom: 20px; overflow: hidden; }
        .modal-img-container.tombstone-mode img { max-width: 100%; max-height: 55vh; object-fit: contain; }
        .modal-img-container.standard-mode img { width: 100%; height: 280px; object-fit: cover; }

        [x-cloak] { display: none !important; }

        /* Responsive Breakpoints */
        @media (max-width: 1024px) {
            .features-grid { grid-template-columns: repeat(2, 1fr); }
            .feature-box { border-right: none; border-left: none; border-bottom: 1px solid rgba(197, 168, 128, 0.15); }
            .about-grid, .split-grid, .footer-grid { grid-template-columns: 1fr; }
            .projects-gallery { grid-template-columns: repeat(3, 1fr); }
            .products-items-grid { grid-template-columns: repeat(2, 1fr); }
            .sizes-items-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .hero-content h1 { font-size: 2.8rem; }
            .projects-gallery { grid-template-columns: repeat(2, 1fr); }
            .products-items-grid, .sizes-items-grid { grid-template-columns: 1fr; }
            .hero-buttons { flex-direction: column; }
            .services-list-grid { grid-template-columns: 1fr; }
            .section-title h2 { font-size: 2.5rem; }
        }
    </style>
</head>
<body x-data="{ modalOpen: false, modalContent: {} }">

    <header>
        <div class="container navbar">
            <a href="#home" class="logo">
                <img src="images/logo.png" alt="Tulip Stone Logo">
                <span>TULIP STONE</span>
            </a>
            <ul class="nav-links">
                <li><a href="#home" class="active" x-text="t('nav.home')"></a></li>
                <li><a href="#about" x-text="t('nav.about')"></a></li>
                <li><a href="#marble" x-text="t('nav.marble')"></a></li>
                <li><a href="#granite" x-text="t('nav.granite')"></a></li>
                <li><a href="#tombstone" x-text="t('nav.tombstone')"></a></li>
                <li><a href="#sizes" x-text="t('nav.sizes')"></a></li>
                <li><a href="#services" x-text="t('nav.services')"></a></li>
                <li><a href="#projects" x-text="t('nav.projects')"></a></li>
                <li><a href="#contact" x-text="t('nav.contact')"></a></li>
            </ul>
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="lang-btn" @click="toggleLang" x-text="lang === 'en' ? 'العربية' : 'English'"></button>
                <a href="#contact" class="btn-outline" style="padding: 8px 20px; font-size: 0.75rem;" x-text="t('nav.quote')"></a>
            </div>
        </div>
    </header>

    <section class="hero-section" id="home">
        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide" style="background-image: url('images/slider-1.jpg');">
                    <div class="hero-content">
                        <span x-text="t('hero.slide1.span')"></span>
                        <h1 x-html="t('hero.slide1.h1')"></h1>
                        <p x-text="t('hero.slide1.p')"></p>
                        <div class="hero-buttons">
                            <a href="#marble" class="btn-gold" x-text="t('hero.slide1.btn1')"></a>
                            <a href="#contact" class="btn-outline" x-text="t('hero.slide1.btn2')"></a>
                        </div>
                    </div>
                </div>
                <div class="swiper-slide" style="background-image: url('images/slider-2.jpg');">
                    <div class="hero-content">
                        <span x-text="t('hero.slide2.span')"></span>
                        <h1 x-html="t('hero.slide2.h1')"></h1>
                        <p x-text="t('hero.slide2.p')"></p>
                        <div class="hero-buttons">
                            <a href="#granite" class="btn-gold" x-text="t('hero.slide2.btn1')"></a>
                            <a href="#projects" class="btn-outline" x-text="t('hero.slide2.btn2')"></a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>
            <div class="swiper-pagination"></div>
        </div>
    </section>

    <section class="features-section">
        <div class="container features-grid">
            <div class="feature-box" data-aos="fade-up">
                <i class="fa-regular fa-gem"></i>
                <h3 x-text="t('features.f1.title')"></h3>
                <p x-text="t('features.f1.desc')"></p>
            </div>
            <div class="feature-box" data-aos="fade-up" data-aos-delay="100">
                <i class="fa-solid fa-earth-americas"></i>
                <h3 x-text="t('features.f2.title')"></h3>
                <p x-text="t('features.f2.desc')"></p>
            </div>
            <div class="feature-box" data-aos="fade-up" data-aos-delay="200">
                <i class="fa-solid fa-handshake"></i>
                <h3 x-text="t('features.f3.title')"></h3>
                <p x-text="t('features.f3.desc')"></p>
            </div>
            <div class="feature-box" data-aos="fade-up" data-aos-delay="300">
                <i class="fa-solid fa-truck-fast"></i>
                <h3 x-text="t('features.f4.title')"></h3>
                <p x-text="t('features.f4.desc')"></p>
            </div>
        </div>
    </section>

    <section class="about-section" id="about">
        <div class="container about-grid">
            <div class="about-img" data-aos="fade-right">
                <img src="images/about.png" alt="Tulip Stone Quarry">
            </div>
            <div class="about-content" data-aos="fade-left">
                <span x-text="t('about.span')"></span>
                <h2 x-text="t('about.h2')"></h2>
                <p x-text="t('about.p')"></p>
                <a href="#contact" class="btn-outline" x-text="t('about.btn')"></a>
            </div>
        </div>
    </section>

    <section class="product-items-section" id="marble">
        <div class="container">
            <div class="section-title" data-aos="fade-up">
                <span x-text="t('collection')"></span>
                <h2 x-text="t('nav.marble')"></h2>
            </div>
            <div class="products-items-grid">
                <div class="product-card" data-aos="fade-up">
                    <div class="product-card-img" style="background-image: url('images/trista.jpg');"></div>
                    <div class="product-card-body">
                        <h3 x-text="t('products.trista.title')"></h3>
                        <p x-text="t('products.trista.short')"></p>
                        <button @click="modalOpen = true; modalContent = {
                            name: t('products.trista.title'),
                            image: 'images/trista.jpg',
                            isTombstone: false,
                            desc: t('products.trista.desc'),
                            specs: t('products.trista.specs')
                        }" class="btn-gold" style="padding: 8px 18px; font-size: 0.75rem;" x-text="t('view_details')"></button>
                    </div>
                </div>
                <div class="product-card" data-aos="fade-up" data-aos-delay="100">
                    <div class="product-card-img" style="background-image: url('images/sunny-minya.jpg');"></div>
                    <div class="product-card-body">
                        <h3 x-text="t('products.sunny.title')"></h3>
                        <p x-text="t('products.sunny.short')"></p>
                        <button @click="modalOpen = true; modalContent = {
                            name: t('products.sunny.title'),
                            image: 'images/sunny-minya.jpg',
                            isTombstone: false,
                            desc: t('products.sunny.desc'),
                            specs: t('products.sunny.specs')
                        }" class="btn-gold" style="padding: 8px 18px; font-size: 0.75rem;" x-text="t('view_details')"></button>
                    </div>
                </div>
                <div class="product-card" data-aos="fade-up" data-aos-delay="200">
                    <div class="product-card-img" style="background-image: url('images/silvia.jpg');"></div>
                    <div class="product-card-body">
                        <h3 x-text="t('products.silvia.title')"></h3>
                        <p x-text="t('products.silvia.short')"></p>
                        <button @click="modalOpen = true; modalContent = {
                            name: t('products.silvia.title'),
                            image: 'images/silvia.jpg',
                            isTombstone: false,
                            desc: t('products.silvia.desc'),
                            specs: t('products.silvia.specs')
                        }" class="btn-gold" style="padding: 8px 18px; font-size: 0.75rem;" x-text="t('view_details')"></button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="product-items-section" id="granite" style="background: var(--rich-black);">
        <div class="container">
            <div class="section-title" data-aos="fade-up">
                <span x-text="t('collection')"></span>
                <h2 x-text="t('nav.granite')"></h2>
            </div>
            <div class="products-items-grid">
                <div class="product-card" data-aos="fade-up">
                    <div class="product-card-img" style="background-image: url('images/rose-hodi.jpg');"></div>
                    <div class="product-card-body">
                        <h3 x-text="t('products.hodi.title')"></h3>
                        <p x-text="t('products.hodi.short')"></p>
                        <button @click="modalOpen = true; modalContent = {
                            name: t('products.hodi.title'),
                            image: 'images/rose-hodi.jpg',
                            isTombstone: false,
                            desc: t('products.hodi.desc'),
                            specs: t('products.hodi.specs')
                        }" class="btn-gold" style="padding: 8px 18px; font-size: 0.75rem;" x-text="t('view_details')"></button>
                    </div>
